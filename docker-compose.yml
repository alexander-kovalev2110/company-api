version: "3.9"

services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: company-api-php
    volumes:
      - .:/var/www
    working_dir: /var/www
    networks:
      - company-network

  nginx:
    image: nginx:latest
    container_name: company-api-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - company-network

  mysql:
    image: mysql:8.0
    container_name: company-api-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: company_api
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - company-network

networks:
  company-network:
    driver: bridge

volumes:
  mysql_data: